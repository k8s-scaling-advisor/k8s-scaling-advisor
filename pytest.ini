[pytest]
# Pytest configuration for k8s-advisor

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts =
    -v
    --tb=short
    --strict-markers
    --color=yes
    --disable-warnings

# Coverage options (optional, if pytest-cov is installed)
# addopts = -v --cov=k8s_advisor --cov-report=term-missing

# Markers
markers =
    unit: Unit tests (fast, no external dependencies)
    integration: Integration tests (require K8s cluster)
    slow: Slow tests (take >1 second)

# Ignore patterns
norecursedirs =
    .git
    .pytest_cache
    __pycache__
    venv
    reports
    e2e
