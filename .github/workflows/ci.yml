name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Top-level least-privilege. Individual jobs can widen if they need to.
permissions:
  contents: read

jobs:
  tests:
    name: tests (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      # Pinned SHAs prevent a compromised tag from injecting code into our
      # CI. Bumps come through Dependabot which validates SHA + version.
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          # No git pushes / PR creation in this workflow; don't leave
          # GITHUB_TOKEN in the runner's git config.
          persist-credentials: false

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,viz]"

      - name: Run tests
        run: python -m pytest tests --cov=k8s_advisor --cov-report=xml --cov-report=term-missing -q

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354  # v6.0.1
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          # No git pushes / PR creation in this workflow; don't leave
          # GITHUB_TOKEN in the runner's git config.
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: ruff check
        run: ruff check .

      - name: ruff format --check
        run: ruff format --check .

  container-build:
    name: container-build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          # No git pushes / PR creation in this workflow; don't leave
          # GITHUB_TOKEN in the runner's git config.
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3

      # Build-only smoke test: catches Containerfile regressions (missing
      # COPY targets, broken pip install, base-image digest drift) before
      # they reach the release-on-tag workflow. No push, no scan, no
      # signing — those run in `release-image.yml` against a tag.
      - name: Build container
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8  # v6
        with:
          context: .
          file: ./Containerfile
          push: false
          load: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  chart-lint:
    name: chart-lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          # No git pushes / PR creation in this workflow; don't leave
          # GITHUB_TOKEN in the runner's git config.
          persist-credentials: false

      # helm is preinstalled on ubuntu-latest, but pin it so the lint
      # output doesn't drift across runner refreshes.
      - name: Set up Helm
        uses: azure/setup-helm@b9e51907a09c216f16ebe8536097933489208112  # v4.3.0
        with:
          version: v3.16.2

      - name: helm lint
        run: helm lint charts/k8s-scaling-advisor

      - name: helm template (default values)
        run: helm template ci-test charts/k8s-scaling-advisor --namespace ci-test > /dev/null

      - name: helm template (uploader=s3)
        run: |
          helm template ci-test charts/k8s-scaling-advisor --namespace ci-test \
            --set uploader.enabled=true \
            --set uploader.kind=s3 \
            --set uploader.s3.bucket=ci-bucket > /dev/null

      - name: helm template (uploader=slack)
        run: |
          helm template ci-test charts/k8s-scaling-advisor --namespace ci-test \
            --set uploader.enabled=true \
            --set uploader.kind=slack \
            --set uploader.slack.channel=C0123 \
            --set uploader.slack.tokenSecret.name=ci-token > /dev/null

      - name: helm template (uploader=http)
        run: |
          helm template ci-test charts/k8s-scaling-advisor --namespace ci-test \
            --set uploader.enabled=true \
            --set uploader.kind=http \
            --set uploader.http.url=https://collector.example > /dev/null
