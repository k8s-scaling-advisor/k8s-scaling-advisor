name: Auto-tag merged release PR

# When a PR labeled `release` lands on main, auto-increment the patch version
# from the latest v* git tag and push the new tag. That triggers
# `release-image.yml` (build/sign/scan/publish image + chart + GitHub Release).
# All other merges are silent.
#
# Version source of truth: git tags. No manual Chart.yaml bumps needed —
# merging a PR with the `release` label is the only required step.

on:
  pull_request:
    types: [closed]
    branches: [main]

concurrency:
  # Serialize per-target-branch so two release PRs racing each other don't
  # both try to create the same tag.
  group: ${{ github.workflow }}-${{ github.event.pull_request.base.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  tag:
    name: Tag and trigger release
    if: >-
      github.event.pull_request.merged == true &&
      contains(github.event.pull_request.labels.*.name, 'release')
    runs-on: ubuntu-latest
    permissions:
      contents: write  # tag push
    steps:
      - name: Verify release label was applied by the repo owner
        env:
          ACTOR: ${{ github.event.pull_request.merged_by.login }}
          ALLOWED_ACTOR: rajeshkodali
        run: |
          if [ "${ACTOR}" != "${ALLOWED_ACTOR}" ]; then
            echo "::error::Release label must be applied by ${ALLOWED_ACTOR}. Got: ${ACTOR}"
            exit 1
          fi
          echo "::notice::Release authorized by ${ACTOR}."

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          # Full history needed for tag operations.
          fetch-depth: 0
          # Need credentials so the in-runner git can push the tag back.
          # Limited blast radius — only fires on merged PRs labeled
          # `release`.
          persist-credentials: true

      - name: Compute next version
        id: ver
        run: |
          # Find the latest v* tag on origin and bump the patch.
          # Falls back to v0.1.0 if no tags exist yet.
          git fetch --tags origin
          LATEST="$(git tag --list 'v*' --sort=-version:refname | head -1)"
          if [ -z "${LATEST}" ]; then
            NEXT="0.1.0"
          else
            MAJOR="$(echo "${LATEST#v}" | cut -d. -f1)"
            MINOR="$(echo "${LATEST#v}" | cut -d. -f2)"
            PATCH="$(echo "${LATEST#v}" | cut -d. -f3)"
            NEXT="${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi
          TAG="v${NEXT}"
          echo "version=${NEXT}" >> "${GITHUB_OUTPUT}"
          echo "tag=${TAG}"      >> "${GITHUB_OUTPUT}"
          echo "::notice::Latest tag: ${LATEST:-none} → next: ${TAG}"

      - name: Create and push tag
        env:
          TAG: ${{ steps.ver.outputs.tag }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Annotated tag. The PR title is intentionally NOT interpolated
          # into the message — only the integer PR number — to keep
          # `git tag -m` free of any operator-controlled string. Anyone
          # browsing the tag can click through to the PR for context.
          git tag -a "${TAG}" -m "Release ${TAG} (PR #${PR_NUMBER})"
          # Note: tag pushes performed via the runner's GITHUB_TOKEN do
          # NOT trigger downstream workflows (documented GitHub safeguard
          # against infinite-loop chains). The release-image.yml workflow
          # has a `workflow_run` trigger keyed on this workflow's
          # successful completion — that's how the build/publish step is
          # invoked, not via the tag push event itself.
          git push origin "${TAG}"
          echo "::notice::Pushed ${TAG} — release-image.yml will fire via workflow_run."

      - name: Record release-meta for downstream workflow
        env:
          TAG: ${{ steps.ver.outputs.tag }}
        run: |
          # Hand the tag name to release-image.yml via an artifact.
          # Using an artifact (vs. having release-image discover the tag
          # with `git for-each-ref`) avoids races with any other tag-push
          # that lands between our push and its checkout.
          mkdir -p release-meta
          printf '%s' "release" > release-meta/status
          printf '%s' "${TAG}"  > release-meta/tag

      - name: Upload release-meta artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: release-tag
          path: release-meta/
          retention-days: 1
          if-no-files-found: error
