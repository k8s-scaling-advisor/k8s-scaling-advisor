name: Auto-tag merged release PR

# When a PR labeled `release` lands on main, push a `v<chart-version>` tag.
# That tag push triggers `release-image.yml` (build/sign/scan/publish image
# + chart + GitHub Release). All other merges are silent.
#
# Source of truth for the version is `charts/k8s-scaling-advisor/Chart.yaml`'s
# `version:` field. Bump it in the PR you want to release; this workflow
# uses that value verbatim. If the tag already exists (someone forgot to
# bump), the workflow exits 0 with a warning rather than failing the merge.

on:
  pull_request:
    types: [closed]
    branches: [main]

concurrency:
  # Serialize per-target-branch so two release PRs racing each other don't
  # both try to create the same tag.
  group: ${{ github.workflow }}-${{ github.event.pull_request.base.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  tag:
    name: Tag and trigger release
    if: >-
      github.event.pull_request.merged == true &&
      contains(github.event.pull_request.labels.*.name, 'release')
    runs-on: ubuntu-latest
    permissions:
      contents: write  # tag push
    steps:
      - name: Verify release label was applied by the repo owner
        env:
          ACTOR: ${{ github.event.pull_request.merged_by.login }}
          ALLOWED_ACTOR: rajeshkodali
        run: |
          if [ "${ACTOR}" != "${ALLOWED_ACTOR}" ]; then
            echo "::error::Release label must be applied by ${ALLOWED_ACTOR}. Got: ${ACTOR}"
            exit 1
          fi
          echo "::notice::Release authorized by ${ACTOR}."

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          # Full history needed for tag operations.
          fetch-depth: 0
          # Need credentials so the in-runner git can push the tag back.
          # Limited blast radius — only fires on merged PRs labeled
          # `release`.
          persist-credentials: true

      - name: Read chart version
        id: ver
        run: |
          VERSION="$(awk '/^version:/ {print $2; exit}' charts/k8s-scaling-advisor/Chart.yaml)"
          if [ -z "$VERSION" ]; then
            echo "::error::Could not parse version from Chart.yaml"
            exit 1
          fi
          TAG="v${VERSION}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "tag=${TAG}"         >> "${GITHUB_OUTPUT}"
          echo "Releasing ${TAG}"

      - name: Bail if tag already exists
        id: check
        env:
          TAG: ${{ steps.ver.outputs.tag }}
        run: |
          if git rev-parse --verify "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "::warning::Tag ${TAG} already exists — bump Chart.yaml version on the next release PR."
            echo "skipped=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "::warning::Tag ${TAG} already pushed to origin."
            echo "skipped=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          echo "skipped=false" >> "${GITHUB_OUTPUT}"
          echo "Tag does not exist; safe to create."

      - name: Create and push tag
        if: steps.check.outputs.skipped != 'true'
        env:
          TAG: ${{ steps.ver.outputs.tag }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Annotated tag. The PR title is intentionally NOT interpolated
          # into the message — only the integer PR number — to keep
          # `git tag -m` free of any operator-controlled string. Anyone
          # browsing the tag can click through to the PR for context.
          git tag -a "${TAG}" -m "Release ${TAG} (PR #${PR_NUMBER})"
          # Note: tag pushes performed via the runner's GITHUB_TOKEN do
          # NOT trigger downstream workflows (documented GitHub safeguard
          # against infinite-loop chains). The release-image.yml workflow
          # has a `workflow_run` trigger keyed on this workflow's
          # successful completion — that's how the build/publish step is
          # invoked, not via the tag push event itself.
          git push origin "${TAG}"
          echo "::notice::Pushed ${TAG} — release-image.yml will fire via workflow_run."

      - name: Record release-meta for downstream workflow
        env:
          TAG: ${{ steps.ver.outputs.tag }}
          SKIPPED: ${{ steps.check.outputs.skipped }}
        run: |
          # Hand a status + (optionally) the tag name to release-image.yml
          # via an artifact. Using an artifact (vs. having release-image
          # discover the tag with `git for-each-ref`) avoids races with
          # any other tag-push that lands between our push and its
          # checkout.
          #
          # Always write the status file — downstream uses it to decide
          # release-vs-skip without failing on a missing artifact. The
          # tag file only exists on the release path.
          mkdir -p release-meta
          if [ "${SKIPPED}" = "true" ]; then
            printf '%s' "skipped" > release-meta/status
          else
            printf '%s' "release" > release-meta/status
            printf '%s' "${TAG}"  > release-meta/tag
          fi

      - name: Upload release-meta artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: release-tag
          path: release-meta/
          retention-days: 1
          if-no-files-found: error
