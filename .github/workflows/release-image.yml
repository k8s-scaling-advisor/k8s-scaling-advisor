name: Release Image

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Optional image tag override (default: git tag/SHA)"
        required: false
        type: string
  # Triggered by `auto-tag-on-release-label.yml` after it pushes a tag.
  # Required because tag pushes performed via the runner's GITHUB_TOKEN
  # do NOT trigger downstream workflows (documented GitHub safeguard).
  # `workflow_run` runs in the default branch's context — the job
  # below resolves the actual tag at runtime via `git for-each-ref`.
  workflow_run:
    workflows: ["Auto-tag merged release PR"]
    types: [completed]
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Cheap gate that runs only on workflow_run. Downloads the release-meta
  # artifact the upstream auto-tag wrote and decides whether this is an
  # actual release or a clean skip (tag already existed). Other trigger
  # types (push: tags, workflow_dispatch) bypass this entirely.
  resolve-trigger:
    name: Resolve release trigger
    if: github.event_name == 'workflow_run'
    runs-on: ubuntu-latest
    permissions:
      actions: read
    outputs:
      proceed: ${{ steps.check.outputs.proceed }}
    steps:
      - name: Download release-meta artifact
        if: github.event.workflow_run.conclusion == 'success'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: release-tag
          path: ./release-meta
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read status
        id: check
        run: |
          # If the upstream auto-tag workflow failed, conclusion != success
          # and the download step above was skipped — treat as "no release".
          if [ ! -f release-meta/status ]; then
            echo "::notice::upstream auto-tag run did not produce a release-meta artifact (conclusion=${{ github.event.workflow_run.conclusion }}); skipping"
            echo "proceed=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          STATUS="$(cat release-meta/status)"
          case "$STATUS" in
            release)
              echo "::notice::auto-tag pushed a release; proceeding"
              echo "proceed=true" >> "${GITHUB_OUTPUT}"
              ;;
            skipped)
              echo "::notice::auto-tag exited cleanly without a new tag (status=skipped); skipping"
              echo "proceed=false" >> "${GITHUB_OUTPUT}"
              ;;
            *)
              echo "::error::unknown release-meta/status value: ${STATUS}"
              exit 1
              ;;
          esac

  build-sign-publish:
    name: Build, scan, sign, publish image
    # workflow_run path goes through the resolve-trigger gate first.
    # push: tags / workflow_dispatch always proceed.
    needs: [resolve-trigger]
    if: >-
      always() &&
      (github.event_name != 'workflow_run' ||
       (needs.resolve-trigger.result == 'success' &&
        needs.resolve-trigger.outputs.proceed == 'true'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      security-events: write
      actions: read   # download-artifact needs this for cross-run reads
    outputs:
      image_ref: ${{ steps.export.outputs.image_ref }}
      image_digest: ${{ steps.export.outputs.image_digest }}
      chart_ref: ${{ steps.export.outputs.chart_ref }}
      chart_version: ${{ steps.export.outputs.chart_version }}
      release_tag: ${{ steps.vars.outputs.image_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          # Need full history + tags so the workflow_run path can
          # resolve the most-recent v* tag the auto-tag workflow just
          # pushed. Cheap; fetched once per release run.
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a  # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Pull the tag value the upstream auto-tag workflow recorded.
      # Only runs on the workflow_run path; the upstream wrote a
      # one-line file via actions/upload-artifact called `release-tag`.
      # Using an artifact (rather than `git for-each-ref` to discover
      # the latest tag) makes tag selection deterministic — a manual
      # `git tag v0.0.9-hotfix && git push --tags` racing in between
      # the auto-tag push and this step can't redirect the build.
      - name: Download upstream release-tag artifact
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: release-tag
          path: ./release-meta
          # `workflow_run` artifacts live on the *triggering* run, not
          # the current one — point download-artifact at it explicitly.
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute release variables
        id: vars
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ github.event.inputs.tag || '' }}
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
        run: |
          # Three trigger paths:
          #   1. workflow_dispatch with `tag` input -> use it verbatim.
          #   2. push: tags     -> derive from the pushed tag's name.
          #   3. workflow_run   -> read the tag the upstream workflow
          #                       recorded into the release-tag artifact
          #                       (deterministic, race-free).
          if [ -n "${INPUT_TAG}" ]; then
            IMAGE_TAG="${INPUT_TAG}"
          elif [ "${REF_TYPE}" = "tag" ]; then
            IMAGE_TAG="${REF_NAME#v}"
          elif [ "${EVENT_NAME}" = "workflow_run" ]; then
            if [ ! -f release-meta/tag ]; then
              echo "::error::workflow_run trigger but no release-tag artifact"
              exit 1
            fi
            UPSTREAM_TAG="$(cat release-meta/tag)"
            if [ -z "${UPSTREAM_TAG}" ]; then
              echo "::error::release-tag artifact is empty"
              exit 1
            fi
            git fetch origin "refs/tags/${UPSTREAM_TAG}:refs/tags/${UPSTREAM_TAG}" --no-tags
            # Check out the tag so the build is reproducible against
            # the tagged tree, not whatever main happens to be now.
            git checkout "${UPSTREAM_TAG}"
            IMAGE_TAG="${UPSTREAM_TAG#v}"
          else
            IMAGE_TAG="${SHA::12}"
          fi
          IMAGE_REPO="${REGISTRY}/${IMAGE_NAME}"

          echo "image_tag=${IMAGE_TAG}" >> "${GITHUB_OUTPUT}"
          echo "image_repo=${IMAGE_REPO}" >> "${GITHUB_OUTPUT}"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9  # v6.1.0
        with:
          images: ${{ steps.vars.outputs.image_repo }}
          tags: |
            type=raw,value=${{ steps.vars.outputs.image_tag }}
            type=sha,format=short

      - name: Build and push image
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        with:
          context: .
          file: ./Containerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: mode=max
          sbom: true

      - name: Run Grype vulnerability scan
        id: scan
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2  # v7.4.0
        with:
          image: ${{ steps.vars.outputs.image_repo }}@${{ steps.build.outputs.digest }}
          severity-cutoff: high
          only-fixed: true
          fail-build: true
          output-format: sarif

      - name: Upload Grype scan
        if: always()
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa  # v3
        with:
          sarif_file: ${{ steps.scan.outputs.sarif }}
          category: grype-container

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2

      - name: Sign image with keyless Cosign
        env:
          IMAGE_REF: ${{ steps.vars.outputs.image_repo }}@${{ steps.build.outputs.digest }}
          COSIGN_EXPERIMENTAL: "true"
        run: |
          cosign sign --yes "${IMAGE_REF}"

      - name: Verify signature
        env:
          IMAGE_REF: ${{ steps.vars.outputs.image_repo }}@${{ steps.build.outputs.digest }}
          CERT_IDENTITY: https://github.com/${{ github.repository }}/.github/workflows/release-image.yml@${{ github.ref }}
          COSIGN_EXPERIMENTAL: "true"
        run: |
          cosign verify \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            --certificate-identity "${CERT_IDENTITY}" \
            "${IMAGE_REF}"

      - name: Package and push Helm chart to GHCR (OCI)
        id: chart
        env:
          REGISTRY: ${{ env.REGISTRY }}
          REGISTRY_USER: ${{ github.actor }}
          REGISTRY_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY_OWNER: ${{ github.repository_owner }}
          EVENT_NAME: ${{ github.event_name }}
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
          IMAGE_TAG: ${{ steps.vars.outputs.image_tag }}
          IMAGE_REPO: ${{ steps.vars.outputs.image_repo }}
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -eu
          OWNER_LC="$(printf '%s' "${REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          CHART_REPO_OCI="oci://${REGISTRY}/${OWNER_LC}/charts"
          CHART_DIR="charts/k8s-scaling-advisor"
          CHART_YAML="${CHART_DIR}/Chart.yaml"
          VALUES_YAML="${CHART_DIR}/values.yaml"

          CHART_VERSION="$(awk '/^version:/ {print $2; exit}' "${CHART_YAML}")"

          # Decide whether this run is a "real" tagged release. Both
          # `push: tags` (manual `git tag && git push --tags`) and
          # `workflow_run` from auto-tag-on-release-label.yml count.
          IS_TAG_RELEASE="false"
          if [ "${REF_TYPE}" = "tag" ] || [ "${EVENT_NAME}" = "workflow_run" ]; then
            IS_TAG_RELEASE="true"
          fi

          # ─── Mutations to the runner's checkout (NOT committed back) ───
          # The `.tgz` we publish reflects these edits; the source tree
          # on `main` keeps its empty defaults so contributors aren't
          # forever rebasing past auto-edits.

          if [ "${IS_TAG_RELEASE}" = "true" ]; then
            # Tagged release: chart version + appVersion sync to the tag.
            # Pin image.tag so default `helm install` lands on the
            # human-readable semver. Leave image.digest empty — the tag
            # is itself the durable artifact.
            CHART_VERSION="${IMAGE_TAG}"
            sed -i "s|^version:.*|version: ${CHART_VERSION}|" "${CHART_YAML}"
            sed -i "s|^appVersion:.*|appVersion: \"${CHART_VERSION}\"|" "${CHART_YAML}"
            sed -i "s|^  tag: .*|  tag: \"${IMAGE_TAG}\"|" "${VALUES_YAML}"
            sed -i "s|^  digest: .*|  digest: \"\"|" "${VALUES_YAML}"
            echo "::notice::Tagged release: chart pinned to image.tag=${IMAGE_TAG}"
          else
            # Ad-hoc workflow_dispatch rebuild: no semver to point at.
            # Pin image.digest so the chart is still reproducible; leave
            # image.tag empty so it doesn't conflict with the digest.
            sed -i "s|^  tag: .*|  tag: \"\"|" "${VALUES_YAML}"
            sed -i "s|^  digest: .*|  digest: \"${IMAGE_DIGEST}\"|" "${VALUES_YAML}"
            echo "::notice::Non-release rebuild: chart pinned to image.digest=${IMAGE_DIGEST}"
          fi

          echo "${REGISTRY_TOKEN}" | helm registry login "${REGISTRY}" -u "${REGISTRY_USER}" --password-stdin
          helm package "${CHART_DIR}" --destination ./.chart-out
          helm push "./.chart-out/k8s-scaling-advisor-${CHART_VERSION}.tgz" "${CHART_REPO_OCI}"
          {
            echo "chart_version=${CHART_VERSION}"
            echo "chart_repo=${CHART_REPO_OCI}"
            echo "chart_ref=${CHART_REPO_OCI}/k8s-scaling-advisor"
          } >> "${GITHUB_OUTPUT}"

      - name: Export release outputs
        id: export
        env:
          IMAGE_REPO: ${{ steps.vars.outputs.image_repo }}
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
          CHART_REF: ${{ steps.chart.outputs.chart_ref }}
          CHART_VERSION: ${{ steps.chart.outputs.chart_version }}
        run: |
          IMAGE_REF="${IMAGE_REPO}@${IMAGE_DIGEST}"
          {
            echo "image_ref=${IMAGE_REF}"
            echo "image_digest=${IMAGE_DIGEST}"
            echo "chart_ref=${CHART_REF}"
            echo "chart_version=${CHART_VERSION}"
          } >> "${GITHUB_OUTPUT}"

          cat > image-release.txt <<EOF
          IMAGE_REF=${IMAGE_REF}
          IMAGE_REPOSITORY=${IMAGE_REPO}
          IMAGE_DIGEST=${IMAGE_DIGEST}
          CHART_REF=${CHART_REF}
          CHART_VERSION=${CHART_VERSION}

          # Helm (immutable digest pin) — pulls the chart from GHCR (OCI)
          helm upgrade --install k8s-scaling-advisor ${CHART_REF} \\
            --version ${CHART_VERSION} \\
            --namespace platform-observability --create-namespace \\
            --set image.repository=${IMAGE_REPO} \\
            --set image.digest=${IMAGE_DIGEST}
          EOF

      - name: Upload release metadata artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: image-release
          path: image-release.txt

  publish-release:
    name: Publish GitHub Release
    needs: build-sign-publish
    # Run on real tag pushes AND on workflow_run from auto-tag (where
    # the build job resolved the tag at runtime). Skip on
    # workflow_dispatch — those are ad-hoc rebuilds, not Releases.
    if: github.ref_type == 'tag' || github.event_name == 'workflow_run'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Compose release notes
        id: notes
        env:
          IMAGE_REF: ${{ needs.build-sign-publish.outputs.image_ref }}
          IMAGE_DIGEST: ${{ needs.build-sign-publish.outputs.image_digest }}
          CHART_REF: ${{ needs.build-sign-publish.outputs.chart_ref }}
          CHART_VERSION: ${{ needs.build-sign-publish.outputs.chart_version }}
          REPO: ${{ github.repository }}
          # `release_tag` is the un-prefixed version that the build job
          # resolved (handles all three trigger paths). Prefix with `v`
          # for tag_name / Release name below.
          VERSION: ${{ needs.build-sign-publish.outputs.release_tag }}
          REGISTRY_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        run: |
          TAG="v${VERSION}"
          {
            echo "tag=${TAG}"
          } >> "${GITHUB_OUTPUT}"
          {
            echo "## Container image"
            echo
            echo "Pinned by digest (recommended for production):"
            echo
            echo '```bash'
            echo "docker pull ${IMAGE_REF}"
            echo '```'
            echo
            echo "Or by tag:"
            echo
            echo '```bash'
            echo "docker pull ${REGISTRY_IMAGE}:${VERSION}"
            echo '```'
            echo
            echo "## Helm install"
            echo
            echo "The chart is published as an OCI artifact next to the image."
            echo "No \`git clone\` required."
            echo
            echo '```bash'
            echo "helm upgrade --install k8s-scaling-advisor ${CHART_REF} \\"
            echo "  --version ${CHART_VERSION} \\"
            echo "  --namespace platform-observability --create-namespace \\"
            echo "  --set image.repository=${REGISTRY_IMAGE} \\"
            echo "  --set image.digest=${IMAGE_DIGEST}"
            echo '```'
            echo
            echo "## Verify the signature"
            echo
            echo '```bash'
            echo "cosign verify \\"
            echo "  --certificate-oidc-issuer https://token.actions.githubusercontent.com \\"
            echo "  --certificate-identity-regexp \"https://github.com/${REPO}/.github/workflows/release-image.yml@refs/tags/v.*\" \\"
            echo "  ${IMAGE_REF}"
            echo '```'
            echo
            echo "## Artifacts"
            echo
            echo "- **Image:** \`${REGISTRY_IMAGE}\`"
            echo "- **Digest:** \`${IMAGE_DIGEST}\`"
            echo "- **Chart:** \`${CHART_REF}\` (version \`${CHART_VERSION}\`)"
            echo "- **Tag:** \`${VERSION}\`"
          } > body.md
          echo "body_path=body.md" >> "${GITHUB_OUTPUT}"

      - name: Download release artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: image-release
          path: ./release-assets

      - name: Publish Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3.0.0
        with:
          tag_name: ${{ steps.notes.outputs.tag }}
          name: ${{ steps.notes.outputs.tag }}
          body_path: ${{ steps.notes.outputs.body_path }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            release-assets/image-release.txt
