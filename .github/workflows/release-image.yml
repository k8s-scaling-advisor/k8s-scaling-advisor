name: Release Image

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Optional image tag override (default: git tag/SHA)"
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-sign-publish:
    name: Build, scan, sign, publish image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      security-events: write
    outputs:
      image_ref: ${{ steps.export.outputs.image_ref }}
      image_digest: ${{ steps.export.outputs.image_digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130  # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute release variables
        id: vars
        env:
          INPUT_TAG: ${{ github.event.inputs.tag || '' }}
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
        run: |
          if [ -n "${INPUT_TAG}" ]; then
            IMAGE_TAG="${INPUT_TAG}"
          elif [ "${REF_TYPE}" = "tag" ]; then
            IMAGE_TAG="${REF_NAME#v}"
          else
            IMAGE_TAG="${SHA::12}"
          fi
          IMAGE_REPO="${REGISTRY}/${IMAGE_NAME}"

          echo "image_tag=${IMAGE_TAG}" >> "${GITHUB_OUTPUT}"
          echo "image_repo=${IMAGE_REPO}" >> "${GITHUB_OUTPUT}"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051  # v5
        with:
          images: ${{ steps.vars.outputs.image_repo }}
          tags: |
            type=raw,value=${{ steps.vars.outputs.image_tag }}
            type=sha,format=short

      - name: Build and push image
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8  # v6
        with:
          context: .
          file: ./Containerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: mode=max
          sbom: true

      - name: Run Grype vulnerability scan
        id: scan
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2  # v7.4.0
        with:
          image: ${{ steps.vars.outputs.image_repo }}@${{ steps.build.outputs.digest }}
          severity-cutoff: high
          only-fixed: true
          fail-build: true
          output-format: sarif

      - name: Upload Grype scan
        if: always()
        uses: github/codeql-action/upload-sarif@458d36d7d4f47d0dd16ca424c1d3cda0060f1360  # v3
        with:
          sarif_file: ${{ steps.scan.outputs.sarif }}
          category: grype-container

      - name: Install Cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac  # v3

      - name: Sign image with keyless Cosign
        env:
          IMAGE_REF: ${{ steps.vars.outputs.image_repo }}@${{ steps.build.outputs.digest }}
          COSIGN_EXPERIMENTAL: "true"
        run: |
          cosign sign --yes "${IMAGE_REF}"

      - name: Verify signature
        env:
          IMAGE_REF: ${{ steps.vars.outputs.image_repo }}@${{ steps.build.outputs.digest }}
          CERT_IDENTITY: https://github.com/${{ github.repository }}/.github/workflows/release-image.yml@${{ github.ref }}
          COSIGN_EXPERIMENTAL: "true"
        run: |
          cosign verify \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            --certificate-identity "${CERT_IDENTITY}" \
            "${IMAGE_REF}"

      - name: Export release outputs
        id: export
        env:
          IMAGE_REPO: ${{ steps.vars.outputs.image_repo }}
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          IMAGE_REF="${IMAGE_REPO}@${IMAGE_DIGEST}"
          {
            echo "image_ref=${IMAGE_REF}"
            echo "image_digest=${IMAGE_DIGEST}"
          } >> "${GITHUB_OUTPUT}"

          cat > image-release.txt <<EOF
          IMAGE_REF=${IMAGE_REF}
          IMAGE_REPOSITORY=${IMAGE_REPO}
          IMAGE_DIGEST=${IMAGE_DIGEST}

          # Helm (immutable digest pin)
          helm upgrade --install k8s-scaling-advisor ./charts/k8s-scaling-advisor \\
            --namespace platform-observability --create-namespace \\
            --set image.repository=${IMAGE_REPO} \\
            --set image.digest=${IMAGE_DIGEST}
          EOF

      - name: Upload release metadata artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: image-release
          path: image-release.txt
