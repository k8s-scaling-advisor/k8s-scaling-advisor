name: Semgrep

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly Tuesday 09:00 UTC — staggered from CodeQL (Mondays) so the
    # security signal lands on different days of the week.
    - cron: '0 9 * * 2'

# Cancel superseded runs on the same PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Top-level least-privilege.
permissions:
  contents: read

jobs:
  semgrep:
    name: semgrep
    # Skip Dependabot PRs — they don't need a fresh Semgrep run, and the
    # token they get can't write security-events anyway.
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write   # required to upload SARIF to the Security tab

    container:
      # Semgrep ships its own Docker image with the CLI + rule cache
      # pre-installed, so no Python setup needed.
      image: returntocorp/semgrep@sha256:9349edbadf90c3f3c0c3f55867625354e89680e6fa10d9034042af52fdb0e0d0

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Run Semgrep
        # Use Semgrep's curated rule packs:
        #   p/python           — Python-specific bugs and security issues
        #   p/security-audit   — broad security audit rules
        #   p/owasp-top-ten    — OWASP Top 10 patterns
        #   p/cwe-top-25       — CWE Top 25 most dangerous weaknesses
        # SARIF output gets uploaded to the Security tab below.
        run: semgrep ci --sarif --output=semgrep.sarif
        env:
          SEMGREP_RULES: >-
            p/python
            p/security-audit
            p/owasp-top-ten
            p/cwe-top-25

      - name: Upload SARIF to GitHub Security tab
        if: always()  # upload even on findings-fail so they show up
        uses: github/codeql-action/upload-sarif@9e0d7b8d25671d64c341c19c0152d693099fb5ba  # v4.35.5
        with:
          sarif_file: semgrep.sarif
          category: semgrep
