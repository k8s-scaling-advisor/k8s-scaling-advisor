image:
  # GHCR path is set by the release workflow; override per-environment as needed.
  repository: ghcr.io/k8s-scaling-advisor/k8s-scaling-advisor
  # Empty by default — falls back to .Chart.AppVersion (see _helpers.tpl) so
  # `helm install` pins to the chart-tested image version. Override for dev.
  tag: ""
  # Preferred for production: pin by immutable digest.
  # Example: sha256:abcd1234...
  digest: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: ""
  annotations: {}
  automountServiceAccountToken: true

rbac:
  create: true
  # The advisor is a cluster-admin tool: it looks at *other* workloads
  # to recommend resource changes. Scanning only its own namespace is
  # rarely useful, so the chart defaults to cluster-wide RBAC paired
  # with `--all-namespaces` args. Flip both knobs (clusterWide=false +
  # explicit `-n <ns>` args) for paranoid / single-tenant environments.
  #
  # true  = cluster-wide ClusterRole/ClusterRoleBinding (all namespaces) [default]
  # false = namespace-scoped Role/RoleBinding (only the release namespace).
  #         If you flip this off, also change `args` to `-n <namespace>`.
  clusterWide: true

cronjob:
  enabled: true
  schedule: "0 3 * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: null
  suspend: false
  ttlSecondsAfterFinished: 86400
  backoffLimit: 1
  restartPolicy: Never

# Ad-hoc debug mode for fetching reports out of a finished pod.
# By default, a Job pod that finishes its work is reaped quickly and
# its emptyDir (where reports live) goes with it. Setting `keepAlive`
# to true makes the main container sleep for `keepAliveSeconds` after
# the analysis completes so you have a window to copy files out:
#
#   kubectl exec -n <ns> <pod> -- ls /app/reports
#   kubectl cp -n <ns> <pod>:/app/reports ./local-reports
#
# Production should leave this off and use the uploader sidecar instead.
debug:
  keepAlive: false
  # How long to keep the pod alive after the run, in seconds.
  keepAliveSeconds: 1800  # 30 min

command:
  - k8s-advisor

# Default: scan all namespaces (--all-namespaces) since this is a
# cluster-admin advisory tool. `--graphs` enables the PNG charts the
# markdown report links to. Override with explicit namespaces if you
# need a narrower scope:
#
#   args:
#     - report
#     - -n
#     - team-a
#     - -n
#     - team-b
#     - --format
#     - md,json
#     - --graphs
#
# Strings are passed through `tpl` so values like "{{ .Release.Namespace }}"
# render at install time.
args:
  - report
  - --all-namespaces
  - --format
  - md,json
  - --graphs

# Set the cluster label that appears in report filenames and JSON output.
# Inside a Pod there's no kubeconfig context to derive this from, so set it
# here per-environment (e.g. "prod-us-east-1", "staging").
clusterName: ""

extraEnv: []

podAnnotations: {}
podLabels: {}

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 1
    memory: 1Gi

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop: ["ALL"]

nodeSelector: {}
tolerations: []
affinity: {}

# Reports are written to an ephemeral emptyDir inside each Job pod.
# Capture them via the optional sidecar uploader below, or by adding your
# own sidecar that watches `/app/reports/.done` and ships files to your
# destination of choice (Slack, ticketing system, etc.).
reports:
  path: /app/reports

# Optional: ship reports to S3, Slack, or an HTTP endpoint after each run.
# Implemented as a native Kubernetes sidecar (initContainer with
# restartPolicy: Always) so the pod terminates cleanly when the main
# container exits. Requires Kubernetes >= 1.29.
#
# Coordination: the main `advisor` container writes `.done` into the
# reports volume when its analysis is finished. The sidecar polls for
# that sentinel, ships the files, and exits.
uploader:
  enabled: false
  # One of: "s3", "slack", "http", "teams".
  # The chart picks a sensible default image per kind; override below.
  kind: s3
  image:
    # Leave repository empty to use the per-kind default:
    #   s3          -> amazon/aws-cli
    #   slack/http  -> curlimages/curl
    #   teams       -> mcr.microsoft.com/azure-cli (needs jq + python
    #                  for Microsoft Graph response parsing)
    repository: ""
    tag: ""
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi
  # Polling interval (seconds) while waiting for the main container to
  # write the `.done` sentinel.
  pollIntervalSeconds: 5
  # Maximum time to wait for the sentinel before giving up.
  maxWaitSeconds: 600

  # ─── kind: s3 ─────────────────────────────────────────────────────
  # Credentials come from the pod's ServiceAccount via IRSA / Workload
  # Identity / Pod Identity. For static credentials, mount a Secret via
  # `extraEnv` (AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY).
  s3:
    bucket: ""
    prefix: "k8s-advisor"
    region: ""
    endpointUrl: ""  # Set for S3-compatible (MinIO, GCS via HMAC, R2)

  # ─── kind: slack ──────────────────────────────────────────────────
  # The sidecar uploads each report file to a Slack channel using
  # `files.upload` (legacy) or `files.upload_v2` if your token supports
  # it. Provide a Bot/User token via Secret reference.
  slack:
    # Channel ID (preferred — survives renames). e.g. "C0123456789"
    channel: ""
    # Existing Secret containing the token. Key defaults to "token".
    tokenSecret:
      name: ""
      key: token
    # Optional message prefix posted with the upload.
    messagePrefix: "K8s Scaling Advisor report"
    # If true, only ship the markdown summary (skip JSON / raw CSV).
    markdownOnly: true

  # ─── kind: http ───────────────────────────────────────────────────
  # POSTs each file as multipart/form-data (field name "file"). Use this
  # for ticketing systems, custom collectors, generic webhooks.
  http:
    url: ""
    headers: {}  # e.g., { Authorization: "Bearer ..." }

  # ─── kind: teams ──────────────────────────────────────────────────
  # Uploads the markdown report to a Teams channel's SharePoint Files
  # tab via Microsoft Graph (client_credentials flow), then posts a
  # channel message linking to it. See docs/DEPLOYMENT.md for the
  # one-time Azure AD app + admin-consent setup; the chart needs:
  #   - tenantId          (Azure AD tenant)
  #   - clientId          (the AD app's application/client ID)
  #   - teamId            (Teams team / group ID)
  #   - channelId         (channel ID inside that team)
  #   - clientSecretSecret.name / .key  (Secret holding the AD app's
  #                                      client secret)
  #
  # AD app needs Application permissions:
  #   Files.ReadWrite.All  (admin consent required)
  #   ChannelMessage.Send  (admin consent required)
  #
  # Reports always upload as a real file to SharePoint; the channel
  # message contains a short summary and the file's webUrl.
  teams:
    tenantId: ""
    clientId: ""
    teamId: ""
    channelId: ""
    clientSecretSecret:
      name: ""
      key: clientSecret
    # Optional message prefix posted with the link.
    messagePrefix: "K8s Scaling Advisor report"
    # If true, only upload the .md report (skip CSV / JSON / PNGs).
    markdownOnly: true

  extraEnv: []
  # Mount additional secrets (e.g., for static AWS creds, custom CAs).
  extraVolumeMounts: []
  extraVolumes: []
