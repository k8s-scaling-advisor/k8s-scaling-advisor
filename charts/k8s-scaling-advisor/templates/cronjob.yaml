{{- if .Values.cronjob.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "k8s-scaling-advisor.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ include "k8s-scaling-advisor.name" . }}
    helm.sh/chart: {{ include "k8s-scaling-advisor.chart" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  schedule: {{ .Values.cronjob.schedule | quote }}
  concurrencyPolicy: {{ .Values.cronjob.concurrencyPolicy }}
  successfulJobsHistoryLimit: {{ .Values.cronjob.successfulJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ .Values.cronjob.failedJobsHistoryLimit }}
  {{- if .Values.cronjob.startingDeadlineSeconds }}
  startingDeadlineSeconds: {{ .Values.cronjob.startingDeadlineSeconds }}
  {{- end }}
  suspend: {{ .Values.cronjob.suspend }}
  jobTemplate:
    spec:
      backoffLimit: {{ .Values.cronjob.backoffLimit }}
      {{- if .Values.cronjob.ttlSecondsAfterFinished }}
      ttlSecondsAfterFinished: {{ .Values.cronjob.ttlSecondsAfterFinished }}
      {{- end }}
      template:
        metadata:
          labels:
            app.kubernetes.io/name: {{ include "k8s-scaling-advisor.name" . }}
            app.kubernetes.io/instance: {{ .Release.Name }}
            {{- with .Values.podLabels }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.podAnnotations }}
          annotations:
            {{- toYaml . | nindent 12 }}
          {{- end }}
        spec:
          serviceAccountName: {{ include "k8s-scaling-advisor.serviceAccountName" . }}
          restartPolicy: {{ .Values.cronjob.restartPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          {{- with .Values.imagePullSecrets }}
          imagePullSecrets:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if .Values.uploader.enabled }}
          # Native sidecar (initContainer with restartPolicy: Always).
          # Requires Kubernetes >= 1.29.
          initContainers:
            - name: uploader
              image: "{{ include "k8s-scaling-advisor.uploaderImage" . }}"
              imagePullPolicy: {{ .Values.uploader.image.pullPolicy }}
              restartPolicy: Always
              securityContext:
                {{- toYaml .Values.containerSecurityContext | nindent 16 }}
              command: ["/bin/sh", "-c"]
              args:
                - |
                  set -eu
                  REPORTS={{ .Values.reports.path }}
                  POLL={{ .Values.uploader.pollIntervalSeconds }}
                  MAX={{ .Values.uploader.maxWaitSeconds }}
                  echo "[uploader] waiting for $REPORTS/.done (poll=${POLL}s, max=${MAX}s)"
                  WAITED=0
                  while [ ! -f "$REPORTS/.done" ]; do
                    if [ "$WAITED" -ge "$MAX" ]; then
                      echo "[uploader] timed out waiting for .done sentinel" >&2
                      exit 1
                    fi
                    sleep "$POLL"
                    WAITED=$((WAITED + POLL))
                  done
                  echo "[uploader] sentinel found, shipping reports"
                  {{- if eq .Values.uploader.kind "s3" }}
                  : "${S3_BUCKET:?S3_BUCKET must be set}"
                  EXTRA=""
                  if [ -n "${S3_ENDPOINT_URL:-}" ]; then EXTRA="--endpoint-url $S3_ENDPOINT_URL"; fi
                  if [ -n "${S3_REGION:-}" ]; then export AWS_DEFAULT_REGION="$S3_REGION"; fi
                  cd "$REPORTS"
                  for f in $(find . -type f ! -name '.done' | sed 's|^\./||'); do
                    aws s3 cp "$f" "s3://$S3_BUCKET/${S3_PREFIX:-k8s-advisor}/$f" $EXTRA
                  done
                  {{- else if eq .Values.uploader.kind "slack" }}
                  : "${SLACK_TOKEN:?SLACK_TOKEN must be set (mounted from a Secret)}"
                  : "${SLACK_CHANNEL:?SLACK_CHANNEL must be set}"
                  cd "$REPORTS"
                  PATTERN='*.md'
                  if [ "${SLACK_MARKDOWN_ONLY:-true}" != "true" ]; then PATTERN='*'; fi
                  for f in $(find . -type f -name "$PATTERN" ! -name '.done' | sed 's|^\./||'); do
                    echo "[uploader] uploading $f to Slack channel $SLACK_CHANNEL"
                    # Slack returns HTTP 200 for many application-level errors
                    # (invalid_auth, no_file_data, channel_not_found, ...).
                    # We must parse the JSON body and check `"ok":true`.
                    resp="$(curl -fsS -F file=@"$f" \
                      -F "channels=$SLACK_CHANNEL" \
                      -F "initial_comment=${SLACK_MESSAGE_PREFIX:-K8s Scaling Advisor report}: $f" \
                      -H "Authorization: Bearer $SLACK_TOKEN" \
                      https://slack.com/api/files.upload)"
                    if ! printf '%s' "$resp" | grep -q '"ok"[[:space:]]*:[[:space:]]*true'; then
                      echo "[uploader] Slack upload failed for $f: $resp" >&2
                      exit 1
                    fi
                    echo
                  done
                  {{- else if eq .Values.uploader.kind "http" }}
                  : "${HTTP_URL:?HTTP_URL must be set}"
                  cd "$REPORTS"
                  for f in $(find . -type f ! -name '.done' | sed 's|^\./||'); do
                    echo "[uploader] POSTing $f to $HTTP_URL"
                    curl -fsS -F file=@"$f" \
                      {{- range $k, $v := .Values.uploader.http.headers }}
                      -H {{ printf "%s: %s" $k $v | quote }} \
                      {{- end }}
                      "$HTTP_URL"
                    echo
                  done
                  {{- else if eq .Values.uploader.kind "teams" }}
                  # Microsoft Graph 3-step flow:
                  #   1. POST /oauth2/v2.0/token  (client_credentials)
                  #   2. PUT  /drives/{}/items/{}:/<f>:/content  (file upload)
                  #   3. POST /teams/{}/channels/{}/messages     (chat post with link)
                  # The image is mcr.microsoft.com/azure-cli which ships
                  # jq + python; the json parsing below uses jq.
                  : "${TEAMS_TENANT_ID:?TEAMS_TENANT_ID must be set}"
                  : "${TEAMS_CLIENT_ID:?TEAMS_CLIENT_ID must be set}"
                  : "${TEAMS_CLIENT_SECRET:?TEAMS_CLIENT_SECRET must be set}"
                  : "${TEAMS_TEAM_ID:?TEAMS_TEAM_ID must be set}"
                  : "${TEAMS_CHANNEL_ID:?TEAMS_CHANNEL_ID must be set}"

                  echo "[uploader] requesting Graph token"
                  ACCESS_TOKEN="$(curl -fsS -X POST \
                    -H 'Content-Type: application/x-www-form-urlencoded' \
                    --data-urlencode "client_id=${TEAMS_CLIENT_ID}" \
                    --data-urlencode "client_secret=${TEAMS_CLIENT_SECRET}" \
                    --data-urlencode 'scope=https://graph.microsoft.com/.default' \
                    --data-urlencode 'grant_type=client_credentials' \
                    "https://login.microsoftonline.com/${TEAMS_TENANT_ID}/oauth2/v2.0/token" \
                    | jq -er '.access_token')"

                  echo "[uploader] resolving channel filesFolder"
                  FOLDER_JSON="$(curl -fsS \
                    -H "Authorization: Bearer $ACCESS_TOKEN" \
                    "https://graph.microsoft.com/v1.0/teams/${TEAMS_TEAM_ID}/channels/${TEAMS_CHANNEL_ID}/filesFolder")"
                  DRIVE_ID="$(printf '%s' "$FOLDER_JSON" | jq -er '.parentReference.driveId')"
                  FOLDER_ID="$(printf '%s' "$FOLDER_JSON" | jq -er '.id')"

                  cd "$REPORTS"
                  PATTERN='*'
                  if [ "${TEAMS_MARKDOWN_ONLY:-true}" = "true" ]; then PATTERN='*.md'; fi

                  # Build the message body's HTML link list as we go.
                  LINKS_FILE="$(mktemp)"
                  for f in $(find . -type f -name "$PATTERN" ! -name '.done' | sed 's|^\./||'); do
                    [ -z "$f" ] && continue
                    echo "[uploader] uploading $f to SharePoint"
                    WEB_URL="$(curl -fsS -X PUT \
                      -H "Authorization: Bearer $ACCESS_TOKEN" \
                      -H 'Content-Type: application/octet-stream' \
                      --data-binary @"$f" \
                      "https://graph.microsoft.com/v1.0/drives/${DRIVE_ID}/items/${FOLDER_ID}:/${f}:/content" \
                      | jq -er '.webUrl')"
                    # Each link as one HTML <li>, escaped via jq -Rs to
                    # protect against filenames containing < > & etc.
                    NAME_HTML="$(printf '%s' "$f" | jq -Rs '.[0:-1] | @html')"
                    URL_HTML="$(printf '%s' "$WEB_URL" | jq -Rs '.[0:-1] | @html')"
                    printf '<li><a href=%s>%s</a></li>' "$URL_HTML" "$NAME_HTML" >> "$LINKS_FILE"
                  done

                  if [ ! -s "$LINKS_FILE" ]; then
                    echo "[uploader] no files matched pattern $PATTERN — nothing to post" >&2
                    exit 1
                  fi

                  echo "[uploader] posting channel message"
                  PREFIX="${TEAMS_MESSAGE_PREFIX:-K8s Scaling Advisor report}"
                  PREFIX_HTML="$(printf '%s' "$PREFIX" | jq -Rs '.[0:-1] | @html')"
                  MSG_HTML="<p>${PREFIX_HTML}</p><ul>$(cat "$LINKS_FILE")</ul>"
                  rm -f "$LINKS_FILE"

                  MSG_BODY="$(jq -nc --arg html "$MSG_HTML" '{body:{contentType:"html", content:$html}}')"
                  POST_RESP="$(curl -fsS -X POST \
                    -H "Authorization: Bearer $ACCESS_TOKEN" \
                    -H 'Content-Type: application/json' \
                    -d "$MSG_BODY" \
                    "https://graph.microsoft.com/v1.0/teams/${TEAMS_TEAM_ID}/channels/${TEAMS_CHANNEL_ID}/messages")"
                  printf '%s' "$POST_RESP" | jq -e '.id' >/dev/null || {
                    echo "[uploader] channel message post failed: $POST_RESP" >&2
                    exit 1
                  }
                  echo "[uploader] Teams post complete"
                  {{- end }}
                  echo "[uploader] done"
              env:
                {{- if eq .Values.uploader.kind "s3" }}
                - name: S3_BUCKET
                  value: {{ .Values.uploader.s3.bucket | quote }}
                - name: S3_PREFIX
                  value: {{ .Values.uploader.s3.prefix | quote }}
                {{- if .Values.uploader.s3.region }}
                - name: S3_REGION
                  value: {{ .Values.uploader.s3.region | quote }}
                {{- end }}
                {{- if .Values.uploader.s3.endpointUrl }}
                - name: S3_ENDPOINT_URL
                  value: {{ .Values.uploader.s3.endpointUrl | quote }}
                {{- end }}
                {{- else if eq .Values.uploader.kind "slack" }}
                - name: SLACK_CHANNEL
                  value: {{ .Values.uploader.slack.channel | quote }}
                - name: SLACK_MESSAGE_PREFIX
                  value: {{ .Values.uploader.slack.messagePrefix | quote }}
                - name: SLACK_MARKDOWN_ONLY
                  value: {{ .Values.uploader.slack.markdownOnly | quote }}
                - name: SLACK_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.uploader.slack.tokenSecret.name | quote }}
                      key: {{ .Values.uploader.slack.tokenSecret.key | quote }}
                {{- else if eq .Values.uploader.kind "http" }}
                - name: HTTP_URL
                  value: {{ .Values.uploader.http.url | quote }}
                {{- else if eq .Values.uploader.kind "teams" }}
                - name: TEAMS_TENANT_ID
                  value: {{ .Values.uploader.teams.tenantId | quote }}
                - name: TEAMS_CLIENT_ID
                  value: {{ .Values.uploader.teams.clientId | quote }}
                - name: TEAMS_TEAM_ID
                  value: {{ .Values.uploader.teams.teamId | quote }}
                - name: TEAMS_CHANNEL_ID
                  value: {{ .Values.uploader.teams.channelId | quote }}
                - name: TEAMS_MESSAGE_PREFIX
                  value: {{ .Values.uploader.teams.messagePrefix | quote }}
                - name: TEAMS_MARKDOWN_ONLY
                  value: {{ .Values.uploader.teams.markdownOnly | quote }}
                - name: TEAMS_CLIENT_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.uploader.teams.clientSecretSecret.name | quote }}
                      key: {{ .Values.uploader.teams.clientSecretSecret.key | quote }}
                {{- end }}
                {{- with .Values.uploader.extraEnv }}
                {{- toYaml . | nindent 16 }}
                {{- end }}
              resources:
                {{- toYaml .Values.uploader.resources | nindent 16 }}
              volumeMounts:
                - name: reports
                  mountPath: {{ .Values.reports.path }}
                {{- with .Values.uploader.extraVolumeMounts }}
                {{- toYaml . | nindent 16 }}
                {{- end }}
          {{- end }}
          containers:
            - name: advisor
              image: "{{ include "k8s-scaling-advisor.image" . }}"
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              securityContext:
                {{- toYaml .Values.containerSecurityContext | nindent 16 }}
              {{- if .Values.debug.keepAlive }}
              # Debug mode: run the advisor, then sleep so an operator
              # can `kubectl exec` / `kubectl cp` the reports before the
              # pod terminates. Production should leave debug.keepAlive
              # off and use the uploader sidecar instead.
              command:
                - /bin/sh
                - "-c"
              args:
                - |
                  set +e
                  k8s-advisor{{- range .Values.args }} {{ tpl . $ | quote }}{{- end }}
                  rc=$?
                  echo "[debug] advisor exited rc=$rc; sleeping {{ .Values.debug.keepAliveSeconds }}s for kubectl exec / kubectl cp"
                  echo "[debug] kubectl exec -n $POD_NAMESPACE $POD_NAME -- ls /app/reports"
                  echo "[debug] kubectl cp -n $POD_NAMESPACE $POD_NAME:/app/reports ./local-reports"
                  sleep {{ .Values.debug.keepAliveSeconds }}
                  exit $rc
              {{- else }}
              command:
                {{- range .Values.command }}
                - {{ tpl . $ | quote }}
                {{- end }}
              args:
                {{- range .Values.args }}
                - {{ tpl . $ | quote }}
                {{- end }}
              {{- end }}
              env:
                # Keep app output path aligned with reports.path so the
                # uploader sidecar finds the files.
                - name: K8S_ADVISOR_REPORTS_DIR
                  value: {{ .Values.reports.path | quote }}
                {{- if .Values.clusterName }}
                - name: K8S_ADVISOR_CLUSTER
                  value: {{ .Values.clusterName | quote }}
                {{- end }}
                {{- if .Values.debug.keepAlive }}
                # Surface the pod identity so the debug-mode banner
                # prints copy/pasteable kubectl commands.
                - name: POD_NAME
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.name
                - name: POD_NAMESPACE
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.namespace
                {{- end }}
                {{- with .Values.extraEnv }}
                {{- toYaml . | nindent 16 }}
                {{- end }}
              resources:
                {{- toYaml .Values.resources | nindent 16 }}
              volumeMounts:
                - name: reports
                  mountPath: {{ .Values.reports.path }}
          volumes:
            - name: reports
              emptyDir: {}
            {{- if .Values.uploader.enabled }}
            {{- with .Values.uploader.extraVolumes }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            {{- end }}
          {{- with .Values.nodeSelector }}
          nodeSelector:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.affinity }}
          affinity:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.tolerations }}
          tolerations:
            {{- toYaml . | nindent 12 }}
          {{- end }}
{{- end }}
